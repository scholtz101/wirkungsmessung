<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Platform Coops eG — Genossenschafts-Logo -->
  <!-- Zahnrad (Cog) -->
  <g fill="#fff" opacity="0.95">
    <path d="M100 15 l8 20 h18 l-8 20 12 16 20-8 8 18-20 8 0 22 20 8-8 18-20-8-12 16 8 20h-18l-8 20-8-20h-18l8-20-12-16-20 8-8-18 20-8 0-22-20-8 8-18 20 8 12-16-8-20h18z"
          transform="rotate(0, 100, 100)" />
  </g>
  <!-- Innerer Kreis -->
  <circle cx="100" cy="100" r="55" fill="#2d3a8c"/>
  <!-- Drei Personen (Kooperation) -->
  <g fill="#fff">
    <!-- Person links -->
    <circle cx="72" cy="82" r="9"/>
    <path d="M60 105 a12 12 0 0 1 24 0 v8 h-24z"/>
    <!-- Person mitte -->
    <circle cx="100" cy="75" r="11"/>
    <path d="M85 100 a15 15 0 0 1 30 0 v10 h-30z"/>
    <!-- Person rechts -->
    <circle cx="128" cy="82" r="9"/>
    <path d="M116 105 a12 12 0 0 1 24 0 v8 h-24z"/>
  </g>
  <!-- Verbindungslinie (Kooperation) -->
  <line x1="72" y1="100" x2="128" y2="100" stroke="#fff" stroke-width="2" opacity="0.4"/>
</svg>
